[workspace]
name = "cafe-app"
version = "3.0.0"
description = "Spectral FlowCytometry visualization and analysis tool"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[tasks]
cafe = "python cafe.py"
web = "python web.py"
test = "pytest tests/ -v"

[dependencies]
python = "==3.12.5"
pip = "*"
packaging = ">=25"  # scanpy 1.12.2 requires packaging>=25 (was <25 for the old stack); left as a floor since it's a low-level build util, not part of the pinned science stack
pytest = ">=8.0"

[pypi-dependencies]
# Core numerical and data processing.
# Upgraded 2026-07 to the scanpy 1.12 / numpy 2 / pandas 3 stack. Exact pins for
# reproducibility across the pixi, conda (cafe.yaml) and uv/pip (pyproject.toml)
# install paths — all three resolve to this identical set.
numpy = "==2.4.6"
pandas = "==3.0.3"
scipy = "==1.18.0"
statsmodels = "==0.14.6"
pyarrow = "==25.0.0"
scanpy = "==1.12.2"
anndata = "==0.13.1"
cliffs-delta = "==1.0.0"
matplotlib = "==3.10.9"
seaborn = "==0.13.2"
plotly = "==6.9.0"
cmasher = "==1.9.2"
igraph = "==1.0.0"
streamlit = "==1.59.1"
watchdog = "==6.0.0"
kaleido = "==1.3.0"
