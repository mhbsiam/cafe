name: cafe
channels:
  - defaults
dependencies:
  - python==3.12.5
  - pip
  # Kept in sync with CAFE/pixi.toml [pypi-dependencies] and pyproject.toml.
  # Upgraded 2026-07 to the scanpy 1.12 / numpy 2 / pandas 3 stack. Exact pins so
  # every install path (pixi, conda, uv/pip) resolves to the identical tested set.
  - pip:
      - numpy==2.4.6
      - pandas==3.0.3
      - scipy==1.18.0
      - pyarrow==25.0.0
      - statsmodels==0.14.6
      - scanpy==1.12.2
      - anndata==0.13.1
      - cliffs-delta==1.0.0
      - matplotlib==3.10.9
      - seaborn==0.13.2
      - plotly==6.9.0
      - cmasher==1.9.2
      - igraph==1.0.0
      - streamlit==1.59.1
      - watchdog==6.0.0
      - kaleido==1.3.0
